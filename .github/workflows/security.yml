# CISO-10: Dedicated Security CI Pipeline
# Runs comprehensive security scanning on every push to main/master and on PRs.
# All jobs run in parallel for speed (target: < 10 min total).
# Failures block merge unless the "security-override" label is present.

name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Python SAST with Bandit
  # ──────────────────────────────────────────────
  bandit-sast:
    name: "SAST: Bandit (Python)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml] sarif-om jschema-to-python

      - name: Run Bandit (medium+ severity)
        working-directory: backend
        run: |
          bandit -r app/ \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o bandit-results.json \
            --exit-zero

      - name: Generate SARIF output
        working-directory: backend
        run: |
          bandit -r app/ \
            --severity-level medium \
            --confidence-level medium \
            -f sarif \
            -o bandit-results.sarif \
            --exit-zero

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: backend/bandit-results.sarif
          category: bandit

      - name: Check for high/critical findings
        working-directory: backend
        run: |
          # Fail the job if any HIGH or CRITICAL issues are found
          HIGH_COUNT=$(python3 -c "
          import json, sys
          with open('bandit-results.json') as f:
              data = json.load(f)
          results = data.get('results', [])
          high_crit = [r for r in results if r.get('issue_severity') in ('HIGH', 'CRITICAL')]
          print(len(high_crit))
          ")

          echo "High/Critical findings: $HIGH_COUNT"
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::Bandit found $HIGH_COUNT high/critical severity issues"
            # Show the findings in the log
            python3 -c "
          import json
          with open('bandit-results.json') as f:
              data = json.load(f)
          for r in data.get('results', []):
              if r.get('issue_severity') in ('HIGH', 'CRITICAL'):
                  print(f\"  [{r['issue_severity']}] {r['issue_text']} at {r['filename']}:{r['line_number']}\")
          "
            exit 1
          fi

      - name: Upload Bandit results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results
          path: backend/bandit-results.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 2: Python dependency audit with pip-audit
  # ──────────────────────────────────────────────
  pip-audit:
    name: "Deps: pip-audit (Python)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen --no-dev

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        working-directory: backend
        run: |
          # Audit installed packages for known vulnerabilities
          # Use uv to export requirements, then audit
          uv pip freeze > /tmp/requirements-frozen.txt 2>/dev/null || uv run pip freeze > /tmp/requirements-frozen.txt
          pip-audit \
            --requirement /tmp/requirements-frozen.txt \
            --format json \
            --output pip-audit-results.json \
            --desc \
            || true

      - name: Evaluate pip-audit results
        working-directory: backend
        run: |
          python3 -c "
          import json, sys
          try:
              with open('pip-audit-results.json') as f:
                  data = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              print('No pip-audit results found or parse error')
              sys.exit(0)

          vulns = data.get('dependencies', [])
          vuln_count = sum(1 for d in vulns if d.get('vulns'))
          if vuln_count > 0:
              print(f'::warning::pip-audit found {vuln_count} packages with known vulnerabilities')
              for dep in vulns:
                  for v in dep.get('vulns', []):
                      desc = v.get('description', 'N/A')[:120]
                      print(f\"  {dep['name']}=={dep['version']}: {v['id']} - {desc}\")
              sys.exit(1)
          else:
              print('pip-audit: No known vulnerabilities found')
          "

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: backend/pip-audit-results.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 3: npm audit for frontend
  # ──────────────────────────────────────────────
  npm-audit:
    name: "Deps: npm audit (Frontend)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit
        working-directory: frontend
        run: |
          # Run audit and capture output; npm audit exits non-zero on findings
          npm audit --json > npm-audit-results.json 2>&1 || true

      - name: Evaluate npm audit results
        working-directory: frontend
        run: |
          node -e "
          const fs = require('fs');
          try {
            const data = JSON.parse(fs.readFileSync('npm-audit-results.json', 'utf8'));
            const meta = data.metadata || {};
            const vulns = meta.vulnerabilities || {};
            const high = (vulns.high || 0) + (vulns.critical || 0);
            const moderate = vulns.moderate || 0;

            console.log('npm audit summary:');
            console.log('  Critical:', vulns.critical || 0);
            console.log('  High:', vulns.high || 0);
            console.log('  Moderate:', vulns.moderate || 0);
            console.log('  Low:', vulns.low || 0);

            if (high > 0) {
              console.error('::error::npm audit found ' + high + ' high/critical vulnerabilities');
              process.exit(1);
            } else if (moderate > 0) {
              console.warn('::warning::npm audit found ' + moderate + ' moderate vulnerabilities');
            } else {
              console.log('npm audit: No high/critical vulnerabilities found');
            }
          } catch (e) {
            console.warn('Could not parse npm audit results:', e.message);
          }
          "

      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-results
          path: frontend/npm-audit-results.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 4: Secret scanning with Gitleaks
  # ──────────────────────────────────────────────
  secret-scan:
    name: "Secrets: Gitleaks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for thorough scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

  # ──────────────────────────────────────────────
  # Job 5: Container image scanning with Trivy
  # ──────────────────────────────────────────────
  trivy-container:
    name: "Container: Trivy (Backend Image)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: security-scan/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "security-scan/backend:${{ github.sha }}"
          format: "sarif"
          output: "trivy-container-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-container-results.sarif"
          category: trivy-container

      - name: Run Trivy (table output for logs)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "security-scan/backend:${{ github.sha }}"
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true

  # ──────────────────────────────────────────────
  # Gate: Security status check
  # ──────────────────────────────────────────────
  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    needs: [bandit-sast, pip-audit, npm-audit, secret-scan, trivy-container]
    if: always()
    steps:
      - name: Check security scan results
        env:
          # Use env vars for any potentially user-influenced data to prevent injection
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          BANDIT_RESULT: ${{ needs.bandit-sast.result }}
          PIP_AUDIT_RESULT: ${{ needs.pip-audit.result }}
          NPM_AUDIT_RESULT: ${{ needs.npm-audit.result }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
          TRIVY_RESULT: ${{ needs.trivy-container.result }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "=== Security Pipeline Results ==="
          echo "Bandit SAST:      $BANDIT_RESULT"
          echo "pip-audit:        $PIP_AUDIT_RESULT"
          echo "npm audit:        $NPM_AUDIT_RESULT"
          echo "Gitleaks:         $SECRET_SCAN_RESULT"
          echo "Trivy Container:  $TRIVY_RESULT"
          echo "================================="

          # Determine if override label is present (PR only)
          OVERRIDE="false"
          if [ "$EVENT_NAME" == "pull_request" ]; then
            if echo "$PR_LABELS" | grep -q "security-override"; then
              echo "::warning::security-override label detected -- allowing merge despite failures"
              OVERRIDE="true"
            fi
          fi

          # Check results
          FAILED="false"
          for result_var in BANDIT_RESULT PIP_AUDIT_RESULT NPM_AUDIT_RESULT SECRET_SCAN_RESULT TRIVY_RESULT; do
            RESULT="${!result_var}"
            if [ "$RESULT" != "success" ]; then
              echo "::error::$result_var = $RESULT (expected: success)"
              FAILED="true"
            fi
          done

          if [ "$FAILED" == "true" ] && [ "$OVERRIDE" == "false" ]; then
            echo "::error::One or more security scans failed. Add the 'security-override' label to bypass."
            exit 1
          elif [ "$FAILED" == "true" ] && [ "$OVERRIDE" == "true" ]; then
            echo "::warning::Security failures overridden via label. Ensure security team has reviewed."
          else
            echo "All security scans passed."
          fi
