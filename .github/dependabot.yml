# CISO-10: Dependabot configuration for automated dependency updates
# Checks weekly for pip, npm, Docker, and GitHub Actions updates.
# Security team is auto-assigned as reviewer on all dependency PRs.

version: 2
updates:
  # Python dependencies (backend)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "alexstinard"
    labels:
      - "dependencies"
      - "security"
      - "backend"
      - "python"
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-minor:
        update-types:
          - "minor"
          - "patch"
      python-major:
        update-types:
          - "major"
    ignore:
      # Ignore major updates for ML libraries (need careful testing)
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
      - dependency-name: "transformers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "spacy"
        update-types: ["version-update:semver-major"]
    # Flag security-only updates for expedited review
    security-updates-only: false

  # npm dependencies (frontend)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "alexstinard"
    labels:
      - "dependencies"
      - "security"
      - "frontend"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-minor:
        update-types:
          - "minor"
          - "patch"
      npm-major:
        update-types:
          - "major"
    ignore:
      # Ignore major React updates (need careful migration)
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "alexstinard"
    labels:
      - "dependencies"
      - "security"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "*"

  # Docker dependencies (backend)
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    reviewers:
      - "alexstinard"
    labels:
      - "dependencies"
      - "security"
      - "docker"
      - "backend"
    commit-message:
      prefix: "chore(docker)"

  # Docker dependencies (frontend)
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    reviewers:
      - "alexstinard"
    labels:
      - "dependencies"
      - "security"
      - "docker"
      - "frontend"
    commit-message:
      prefix: "chore(docker)"

  # Docker dependencies (root - docker-compose base images)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    reviewers:
      - "alexstinard"
    labels:
      - "dependencies"
      - "security"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
