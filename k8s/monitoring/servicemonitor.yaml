apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: clinical-ontology
  labels:
    app.kubernetes.io/name: backend-monitor
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: clinical-ontology-normalizer
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: api
  namespaceSelector:
    matchNames:
      - clinical-ontology
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
---
