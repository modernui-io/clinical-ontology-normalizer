apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-clinical-ontology
  namespace: clinical-ontology
  labels:
    app.kubernetes.io/name: grafana-dashboard
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: clinical-ontology-normalizer
    grafana_dashboard: "1"
data:
