          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"clinical-ontology\", job=\"backend\"}[5m])) by (le)) * 1000",
              "legendFormat": "p95 Latency"
            }
          ],
          "title": "P95 Latency",
          "type": "stat"
        },
