apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: clinical-ontology

namePrefix: prod-

resources:
  - ../../

patches:
  # Production replicas
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: frontend

  # Production HPA
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 15
    target:
      kind: HorizontalPodAutoscaler
      name: backend-hpa

  # Production resource limits
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"
    target:
      kind: Deployment
      name: backend

  # Production PostgreSQL resources
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "4000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "8Gi"
    target:
      kind: StatefulSet
      name: postgres

  # Production PVC sizes
  - patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 10Gi
    target:
      kind: PersistentVolumeClaim
      name: redis-pvc

  # Production ingress annotations
  - patch: |-
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1limit-rps
        value: "50"
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1limit-connections
        value: "100"
    target:
      kind: Ingress
      name: clinical-ontology-ingress

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=WARNING
      - API_URL=https://clinical-ontology.example.com/api
      - CORS_ORIGINS=https://clinical-ontology.example.com
      - FEATURE_AUDIT_LOGGING=true
      - RATE_LIMIT_REQUESTS=200
      - RATE_LIMIT_WINDOW=60

images:
  - name: clinical-ontology/backend
    newTag: v1.0.0
  - name: clinical-ontology/frontend
    newTag: v1.0.0

commonLabels:
  environment: production

commonAnnotations:
  app.kubernetes.io/environment: "production"
