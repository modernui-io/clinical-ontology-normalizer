apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: clinical-ontology
  labels:
    app.kubernetes.io/name: config
    app.kubernetes.io/part-of: clinical-ontology-normalizer
data:
  # Environment settings
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"

  # API Configuration
  API_URL: "https://clinical-ontology.example.com/api"
  API_VERSION: "v1"

  # Redis Configuration
  REDIS_URL: "redis://redis:6379/0"
  REDIS_CACHE_TTL: "3600"

  # CORS Configuration
  CORS_ORIGINS: "https://clinical-ontology.example.com"

  # Feature Flags
  FEATURE_SNOMED_LOOKUP: "true"
  FEATURE_ICD10_AUTOCOMPLETE: "true"
  FEATURE_CPT_SUGGESTIONS: "true"
  FEATURE_RXNORM_INTERACTIONS: "true"
  FEATURE_FHIR_EXPORT: "true"
  FEATURE_AUDIT_LOGGING: "true"

  # Vocabulary Settings
  ICD10_VERSION: "2024"
  SNOMED_VERSION: "US2024AB"
  RXNORM_VERSION: "2024AA"
  CPT_VERSION: "2024"

  # Rate Limiting
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"

  # Pagination
  DEFAULT_PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"

  # Timeouts
  REQUEST_TIMEOUT: "30"
  DATABASE_POOL_SIZE: "10"
  DATABASE_MAX_OVERFLOW: "5"

  # Metrics
  METRICS_ENABLED: "true"
  METRICS_PATH: "/metrics"
