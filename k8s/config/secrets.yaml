apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: clinical-ontology
  labels:
    app.kubernetes.io/name: secrets
    app.kubernetes.io/part-of: clinical-ontology-normalizer
type: Opaque
stringData:
  # Database credentials - REPLACE WITH ACTUAL VALUES
  # Use external secrets manager (Vault, AWS Secrets Manager, etc.) in production
  DATABASE_URL: "postgresql://app_user:CHANGE_ME@postgres:5432/clinical_ontology"
  DATABASE_PASSWORD: "CHANGE_ME"

  # JWT Configuration - REPLACE WITH ACTUAL VALUES
  JWT_SECRET: "CHANGE_ME_GENERATE_SECURE_SECRET"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION: "3600"

  # API Keys - REPLACE WITH ACTUAL VALUES
  API_KEY: "CHANGE_ME_GENERATE_SECURE_API_KEY"

  # External Service API Keys (if needed)
  UMLS_API_KEY: "CHANGE_ME"
  NLM_API_KEY: "CHANGE_ME"

  # Encryption keys
  ENCRYPTION_KEY: "CHANGE_ME_32_BYTE_KEY"

  # Redis password (if authentication enabled)
  REDIS_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: clinical-ontology
  labels:
    app.kubernetes.io/name: postgres-secrets
    app.kubernetes.io/part-of: clinical-ontology-normalizer
type: Opaque
stringData:
  # PostgreSQL credentials - REPLACE WITH ACTUAL VALUES
  POSTGRES_USER: "app_user"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: "clinical_ontology"
  POSTGRES_REPLICATION_USER: "repl_user"
  POSTGRES_REPLICATION_PASSWORD: "CHANGE_ME"
