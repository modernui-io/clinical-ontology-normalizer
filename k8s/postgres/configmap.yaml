apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: clinical-ontology
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: clinical-ontology-normalizer
data:
  postgresql.conf: |
    # Connection Settings
    listen_addresses = '*'
    port = 5432
    max_connections = 200

    # Memory Settings
    shared_buffers = 1GB
    effective_cache_size = 3GB
    maintenance_work_mem = 256MB
    work_mem = 16MB

    # WAL Settings
    wal_level = replica
    max_wal_size = 2GB
    min_wal_size = 80MB
    checkpoint_completion_target = 0.9

    # Query Tuning
    random_page_cost = 1.1
    effective_io_concurrency = 200
    default_statistics_target = 100

    # Logging
    log_destination = 'stderr'
    logging_collector = on
    log_directory = 'pg_log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_rotation_age = 1d
    log_rotation_size = 100MB
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on
    log_temp_files = 0
    log_autovacuum_min_duration = 0

    # Autovacuum
    autovacuum = on
    autovacuum_max_workers = 3
    autovacuum_naptime = 60
    autovacuum_vacuum_threshold = 50
    autovacuum_analyze_threshold = 50
    autovacuum_vacuum_scale_factor = 0.02
    autovacuum_analyze_scale_factor = 0.01

    # Security
    # P0-012: Enable SSL for in-transit encryption between services.
    # Requires mounting TLS certs into the postgres container.
    # Set ssl_cert_file and ssl_key_file to the mounted paths.
    ssl = on
    ssl_cert_file = '/etc/ssl/certs/server.crt'
    ssl_key_file = '/etc/ssl/private/server.key'
    password_encryption = scram-sha-256
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: clinical-ontology
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: clinical-ontology-normalizer
data:
  01-init-extensions.sql: |
    -- Enable required extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_trgm";
    CREATE EXTENSION IF NOT EXISTS "btree_gin";

    -- Create schemas
    CREATE SCHEMA IF NOT EXISTS ontology;
    CREATE SCHEMA IF NOT EXISTS audit;

    -- Grant permissions
    GRANT ALL PRIVILEGES ON SCHEMA ontology TO app_user;
    GRANT ALL PRIVILEGES ON SCHEMA audit TO app_user;

  02-create-tables.sql: |
    -- ICD-10 codes table
    CREATE TABLE IF NOT EXISTS ontology.icd10_codes (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        code VARCHAR(10) NOT NULL UNIQUE,
        description TEXT NOT NULL,
        category VARCHAR(255),
        chapter VARCHAR(255),
        is_billable BOOLEAN DEFAULT false,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- SNOMED CT codes table
    CREATE TABLE IF NOT EXISTS ontology.snomed_codes (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        concept_id VARCHAR(20) NOT NULL UNIQUE,
        term TEXT NOT NULL,
        semantic_tag VARCHAR(255),
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- CPT codes table
    CREATE TABLE IF NOT EXISTS ontology.cpt_codes (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        code VARCHAR(10) NOT NULL UNIQUE,
        description TEXT NOT NULL,
        category VARCHAR(255),
        rvu_work DECIMAL(10, 4),
        rvu_pe DECIMAL(10, 4),
        rvu_mp DECIMAL(10, 4),
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- RxNorm drugs table
    CREATE TABLE IF NOT EXISTS ontology.rxnorm_drugs (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        rxcui VARCHAR(20) NOT NULL UNIQUE,
        name TEXT NOT NULL,
        tty VARCHAR(20),
        synonym TEXT,
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Create indexes
    CREATE INDEX IF NOT EXISTS idx_icd10_code ON ontology.icd10_codes(code);
    CREATE INDEX IF NOT EXISTS idx_icd10_description_trgm ON ontology.icd10_codes USING gin(description gin_trgm_ops);
    CREATE INDEX IF NOT EXISTS idx_snomed_concept_id ON ontology.snomed_codes(concept_id);
    CREATE INDEX IF NOT EXISTS idx_snomed_term_trgm ON ontology.snomed_codes USING gin(term gin_trgm_ops);
    CREATE INDEX IF NOT EXISTS idx_cpt_code ON ontology.cpt_codes(code);
    CREATE INDEX IF NOT EXISTS idx_rxnorm_rxcui ON ontology.rxnorm_drugs(rxcui);
    CREATE INDEX IF NOT EXISTS idx_rxnorm_name_trgm ON ontology.rxnorm_drugs USING gin(name gin_trgm_ops);
