version: '3.8'

# Docker Compose for Clinical Ontology Normalizer
# Full stack: PostgreSQL, Redis, Neo4j, Kafka, FastAPI Backend, RQ Worker, Next.js Frontend

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: con-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinical_ontology}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: con-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-net
      - queue-net
    restart: unless-stopped

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5
    container_name: con-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - data-net
    restart: unless-stopped

  # Zookeeper (for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: con-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - queue-net
    restart: unless-stopped

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: con-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - queue-net
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: con-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-clinical_ontology}
      REDIS_URL: redis://:${REDIS_PASSWORD:?required}@redis:6379
      NEO4J_URI: bolt://con-neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?required}
      # KAFKA_BOOTSTRAP_SERVERS: kafka:9092  # disabled — not needed for NLP/KG/QA
      DEBUG: ${DEBUG:-false}
      AUTH_BYPASS_DEV: ${AUTH_BYPASS_DEV:-false}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      API_KEY: ${API_KEY:-}
      CON_API_KEYS: ${CON_API_KEYS:-}
      USE_DB_VOCABULARY: ${USE_DB_VOCABULARY:-false}
      # Ontology Feature Flags (Phase 2-4)
      ENABLE_CONCEPT_MAPPING: ${ENABLE_CONCEPT_MAPPING:-true}
      USE_ONTOLOGY_EDGES: ${USE_ONTOLOGY_EDGES:-true}
      ENABLE_TEMPORAL_EXTRACTION: ${ENABLE_TEMPORAL_EXTRACTION:-true}
      # Database SSL (disable for Docker internal networking)
      DATABASE_SSL_MODE: disable
      # LLM Configuration for Q&A Agent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: ollama
      LLM_MODEL: ${LLM_MODEL:-qwen3:latest}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend-net
      - data-net
      - queue-net
    restart: unless-stopped

  # RQ Worker for background jobs
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: con-worker
    command: ["uv", "run", "rq", "worker", "--url", "redis://:${REDIS_PASSWORD:?required}@redis:6379/0", "document_processing", "graph_building", "default"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-clinical_ontology}
      REDIS_URL: redis://:${REDIS_PASSWORD:?required}@redis:6379
      NEO4J_URI: bolt://con-neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?required}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USE_DB_VOCABULARY: ${USE_DB_VOCABULARY:-false}
      DATABASE_SSL_MODE: disable
    volumes:
      - ./backend:/app
    networks:
      - backend-net
      - data-net
      - queue-net
    restart: unless-stopped

  # Database migrations (run manually with: docker compose run --rm migrations)
  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: con-migrations
    command: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-clinical_ontology}
      DATABASE_SSL_MODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data-net
    profiles:
      - migrate

  # Frontend (production mode - no source mounts)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: con-frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  data-net:
    driver: bridge
    internal: true  # No external access to data layer
  queue-net:
    driver: bridge
    internal: true  # No external access to queue layer

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local
  backend_venv:
    driver: local
