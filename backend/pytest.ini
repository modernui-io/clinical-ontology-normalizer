[pytest]
# Pytest configuration for Clinical Ontology Normalizer backend tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode for async tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require database/services)
    slow: Slow running tests
    smoke: Smoke tests for basic functionality
    e2e: End-to-end tests
    regression: NLP pipeline regression tests against golden dataset (CTO-3)
    canary: Synthetic canary tests for clinical workflow monitoring (P2-003)
    benchmark: NLP extraction precision/recall benchmarks (P2-004)
    performance: Performance and latency-bound tests (P3-021)

# Coverage configuration
addopts =
    -v
    --strict-markers
    --tb=short
    -ra

# Coverage configuration - enabled for CI enforcement
# Run manually with: pytest --cov=app --cov-report=term-missing
# Note: Coverage is enforced in CI via addopts below

# Minimum coverage thresholds (CTO stability initiative)
# - New code must maintain 70%+ coverage
# - Overall target: 50% (increase to 70% as coverage improves)
# - Critical services (clinical_calculator, cds_hooks, ai_coding): 90%+ required

# Logging
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Timeout for tests (in seconds)
timeout = 60

# Environment variables for tests
env =
    TESTING=1
    DEBUG=0
    DATABASE_URL=sqlite+aiosqlite:///:memory:
    SYNC_DATABASE_URL=sqlite:///:memory:
    REDIS_URL=redis://localhost:6379/15
