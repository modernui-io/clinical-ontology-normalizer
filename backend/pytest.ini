[pytest]
# Pytest configuration for Clinical Ontology Normalizer backend tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode for async tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require database/services)
    slow: Slow running tests
    smoke: Smoke tests for basic functionality
    e2e: End-to-end tests

# Coverage configuration
addopts =
    -v
    --strict-markers
    --tb=short
    -ra

# Coverage (run with: pytest --cov=app --cov-report=term-missing)
# --cov=app
# --cov-report=term-missing
# --cov-report=html:coverage_html
# --cov-fail-under=50

# Minimum coverage percentage
# Increase this as test coverage improves

# Logging
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Timeout for tests (in seconds)
timeout = 60

# Environment variables for tests
env =
    TESTING=1
    DEBUG=0
    DATABASE_URL=sqlite+aiosqlite:///:memory:
    SYNC_DATABASE_URL=sqlite:///:memory:
    REDIS_URL=redis://localhost:6379/15
